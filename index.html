<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Frontend Simple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>API Flask</h1>

<h2>Tareas</h2>
<input type="text" id="taskInput" placeholder="Nueva tarea">
<button onclick="addTask()">Agregar</button>

<ul id="taskList"></ul>

<hr>

<h2>Usuarios</h2>

<input type="text" id="name" placeholder="Nombre">
<input type="text" id="lastname" placeholder="Apellido">
<input type="text" id="city" placeholder="Ciudad">
<input type="text" id="country" placeholder="País">
<input type="text" id="code" placeholder="Código">
<button onclick="addUser()">Agregar Usuario</button>

<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Ciudad</th>
            <th>País</th>
            <th>Código</th>
        </tr>
    </thead>
    <tbody id="userTable"></tbody>
</table>

<!-- IMPORTANTE -->
<script src="app.js"></script>

</body>
</html>
